services:
  - type: web
    name: health-io-backend
    runtime: node
    region: oregon
    buildCommand: npm ci && npm run build:backend
    startCommand: node dist/server.js
    envVars:
      - key: PORT
        fromSecret: PORT
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: RAZORPAY_KEY_ID
        fromSecret: RAZORPAY_KEY_ID
      - key: RAZORPAY_KEY_SECRET
        fromSecret: RAZORPAY_KEY_SECRET
      - key: GROQ_API_KEY
        fromSecret: GROQ_API_KEY
      - key: GROQ_MODEL
        fromSecret: GROQ_MODEL
